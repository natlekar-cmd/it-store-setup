<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<title>Site Readiness</title>
</head>

<body class="bg-gray-100 p-4">

<h2 class="text-lg font-bold mb-4">Site Readiness</h2>

<div class="space-y-3">

<label><input type="checkbox"> Power Ready</label><br>
<label><input type="checkbox"> Network Ready</label><br>
<label><input type="checkbox"> Rack Installed</label><br>
<label><input type="checkbox"> UPS Working</label><br>

</div>

<button onclick="saveProgress()"
class="mt-5 w-full bg-blue-600 text-white p-3 rounded">
SAVE
</button>

<script>

// ✅ SAVE PROGRESS
function saveProgress() {

  let total = document.querySelectorAll("input[type=checkbox]").length;
  let checked = document.querySelectorAll("input[type=checkbox]:checked").length;

  let percent = Math.round((checked / total) * 100);

  localStorage.setItem("siteReadinessProgress", percent);

  alert("Progress Saved: " + percent + "%");
}

</script>

</body>
</html>
