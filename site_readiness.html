<!DOCTYPE html><html><body>
<h2>Checklist</h2>
<label><input type='checkbox'>Network Ready</label><br>
<label><input type='checkbox'>Power Ready</label><br>
<button id='save'>Save</button>
<script src='js/db.js'></script>
<script>
document.getElementById('save').onclick=async()=>{
let list=[];document.querySelectorAll('input[type=checkbox]').forEach(c=>{
list.push({item:c.parentElement.innerText,checked:c.checked});});
await saveRecord({type:'checklist',list,time:new Date().toISOString()});
alert('Saved');}
</script>
<script>

// ✅ Calculate Progress
function calculateProgress() {

  let total = document.querySelectorAll('input[type="checkbox"]').length;
  let checked = document.querySelectorAll('input[type="checkbox"]:checked').length;

  let percent = Math.round((checked / total) * 100);

  localStorage.setItem("siteReadinessProgress", percent);
}

// ✅ Save button
const saveBtn = document.querySelector('button.bg-primary');

saveBtn.addEventListener('click', () => {
  calculateProgress();
});


// ✅ Auto update when checkbox changed
document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
  cb.addEventListener("change", calculateProgress);
});

</script>

  <script>

// ✅ Calculate Asset Progress
function calculateAssetProgress() {

  let rows = document.querySelectorAll(".asset-row");
  let completed = 0;

  rows.forEach(row => {
    let status = row.innerText.toLowerCase();

    if (status.includes("delivered")) {
      completed++;
    }
  });

  let percent = Math.round((completed / rows.length) * 100);

  localStorage.setItem("assetProgress", percent);
}

// ✅ Run on load + click
window.onload = calculateAssetProgress;

document.querySelectorAll(".asset-row").forEach(row => {
  row.addEventListener("click", calculateAssetProgress);
});

</script>
</body></html>
