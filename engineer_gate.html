<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engineer Gate</title>

<!-- ✅ FIXED Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- ✅ Excel -->
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="w-full max-w-md bg-white p-6 rounded-lg shadow">

  <h2 class="text-xl font-bold text-center mb-4">Engineer Check-In</h2>

  <div class="space-y-3">

    <!-- ✅ Auto Date -->
    <input id="date" type="text" readonly class="w-full p-3 border rounded bg-gray-100">

    <input id="inTime" type="time" class="w-full p-3 border rounded">

    <input id="name" type="text" placeholder="Engineer Name"
      class="w-full p-3 border rounded">

    <input id="mobile" type="tel" placeholder="Mobile Number"
      class="w-full p-3 border rounded">

    <input id="store" type="text" placeholder="Store Name / Code"
      class="w-full p-3 border rounded">

    <!-- ✅ First Visit -->
    <label class="flex gap-2">
      <input type="checkbox" id="firstVisit">
      First Day Visit
    </label>

    <!-- ✅ Excel Upload -->
    <div id="uploadDiv">
      <input type="file" id="excelFile" class="w-full p-2 border rounded">
    </div>

    <button id="checkinBtn"
      class="w-full bg-blue-600 text-white p-3 rounded font-bold">
      CHECK-IN
    </button>

  </div>
</div>

<script>

// ✅ Auto date
const today = new Date().toISOString().split("T")[0];
document.getElementById("date").value = today;

// ✅ Toggle upload
document.getElementById("firstVisit").addEventListener("change", function () {
  document.getElementById("uploadDiv").style.display = this.checked ? "none" : "block";
});

// ✅ Check-in
document.getElementById("checkinBtn").onclick = function () {

  const name = document.getElementById("name").value.trim();
  const mobile = document.getElementById("mobile").value.trim();
  const store = document.getElementById("store").value.trim();
  const inTime = document.getElementById("inTime").value;

  if (!name || !mobile || !store || !inTime) {
    alert("Fill all required fields");
    return;
  }

  // ✅ Save session
  localStorage.setItem("checkedInToday", "true");

  localStorage.setItem("currentSession", JSON.stringify({
    name: name,
    mobile: mobile,
    store: store,
    date: today,
    inTime: inTime
  }));

  // ✅ Redirect (WORKING)
  window.location.href = "central_dashboard.html";
};

</script>

</body>
</html>
