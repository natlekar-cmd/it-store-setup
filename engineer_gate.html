<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Engineer Gate</title>

  <!-- ✅ Tailwind Correct Link -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-md bg-white p-6 rounded-lg shadow">

    <h2 class="text-xl font-bold text-center mb-5">Engineer Check-In</h2>

    <!-- ✅ Form Fields -->
    <div class="space-y-4">

      <input id="name" type="text" placeholder="Engineer Name"
        class="w-full p-3 border rounded" />

      <input id="mobile" type="tel" placeholder="Mobile Number"
        class="w-full p-3 border rounded" />

      <input id="city" type="text" placeholder="City"
        class="w-full p-3 border rounded" />

      <input id="store" type="text" placeholder="Store Name / Code"
        class="w-full p-3 border rounded" />

      <select id="project" class="w-full p-3 border rounded">
        <option value="">Select Project</option>
        <option>New Store Setup</option>
        <option>Store Closure</option>
        <option>Refit</option>
      </select>

      <!-- ✅ Button -->
      <button id="checkinBtn"
        class="w-full bg-blue-600 text-white p-3 rounded font-bold">
        CHECK-IN
      </button>

    </div>
  </div>

  <!-- ✅ IndexedDB Script -->
  <script>
    const DB_NAME = "ITStoreDB";
    const STORE_NAME = "records";

    function openDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, 1);

        request.onupgradeneeded = function (e) {
          e.target.result.createObjectStore(STORE_NAME, {
            keyPath: "id",
            autoIncrement: true
          });
        };

        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function saveRecord(data) {
      const db = await openDB();
      const tx = db.transaction(STORE_NAME, "readwrite");
      tx.objectStore(STORE_NAME).add(data);
    }
  </script>

  <!-- ✅ Button Logic (FIXED + DEBUGABLE) -->
  <script>
    document.getElementById("checkinBtn").addEventListener("click", async () => {

      console.log("✅ Button Clicked");

      const name = document.getElementById("name").value.trim();
      const mobile = document.getElementById("mobile").value.trim();
      const city = document.getElementById("city").value.trim();
      const store = document.getElementById("store").value.trim();
      const project = document.getElementById("project").value;

      // ✅ Validation
      if (!name || !mobile) {
        alert("Please enter Name and Mobile Number");
        return;
      }

      const data = {
        type: "engineer_checkin",
        name,
        mobile,
        city,
        store,
        project,
        timestamp: new Date().toISOString()
      };

      try {
        // ✅ Save Data
        await saveRecord(data);

        // ✅ Store session
        localStorage.setItem("currentSession", JSON.stringify(data));

        console.log("✅ Data Saved");

        // ✅ REDIRECT (Important Fix)
        window.location.href = "./central_dashboard.html";

      } catch (err) {
        console.error("❌ Error saving:", err);
        alert("Error saving data");
      }

    });
  </script>

</body>
</html>
