<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engineer Gate</title>

<!-- ✅ Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- ✅ Excel Library -->
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="w-full max-w-md bg-white p-6 rounded-lg shadow">

  <h2 class="text-xl font-bold text-center mb-5">Engineer Check-In</h2>

  <!-- ✅ FORM -->
  <div class="space-y-4">

    <input id="name" type="text" placeholder="Engineer Name"
      class="w-full p-3 border rounded" />

    <input id="mobile" type="tel" placeholder="Mobile Number"
      class="w-full p-3 border rounded" />

    <input id="city" type="text" placeholder="City"
      class="w-full p-3 border rounded" />

    <input id="store" type="text" placeholder="Store Name / Code"
      class="w-full p-3 border rounded" />

    <select id="project" class="w-full p-3 border rounded">
      <option value="">Select Project</option>
      <option>New Store Setup</option>
      <option>Store Closure</option>
      <option>Refit</option>
    </select>

    <!-- ✅ First Visit -->
    <label class="flex items-center gap-2">
      <input type="checkbox" id="firstVisit">
      First Day Visit
    </label>

    <!-- ✅ IN TIME -->
    <div>
      <label class="text-sm">In Time</label>
      <input type="time" id="inTime" class="w-full p-3 border rounded">
    </div>

    <!-- ✅ OUT TIME -->
    <div>
      <label class="text-sm">Out Time</label>
      <input type="time" id="outTime" class="w-full p-3 border rounded">
    </div>

    <!-- ✅ Upload Excel -->
    <div>
      <label class="text-sm font-bold">Upload Previous Status (Excel)</label>
      <input type="file" id="excelFile" accept=".xlsx, .xls"
        class="w-full p-2 border rounded">
    </div>

    <!-- ✅ Button -->
    <button id="checkinBtn"
      class="w-full bg-blue-600 text-white p-3 rounded font-bold">
      CHECK-IN
    </button>

  </div>
</div>

<!-- ✅ IndexedDB -->
<script>
const DB_NAME = "ITStoreDB";
const STORE_NAME = "records";

function openDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, 1);

    request.onupgradeneeded = function (e) {
      e.target.result.createObjectStore(STORE_NAME, {
        keyPath: "id",
        autoIncrement: true
      });
    };

    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
}

async function saveRecord(data) {
  const db = await openDB();
  const tx = db.transaction(STORE_NAME, "readwrite");
  tx.objectStore(STORE_NAME).add(data);
}

async function getAllRecords() {
  const db = await openDB();
  return new Promise(resolve => {
    const tx = db.transaction(STORE_NAME, "readonly");
    const req = tx.objectStore(STORE_NAME).getAll();
    req.onsuccess = () => resolve(req.result);
  });
}
</script>

<!-- ✅ MAIN LOGIC -->
<script>
document.getElementById("checkinBtn").addEventListener("click", async () => {

  const name = document.getElementById("name").value.trim();
  const mobile = document.getElementById("mobile").value.trim();
  const city = document.getElementById("city").value.trim();
  const store = document.getElementById("store").value.trim();
  const project = document.getElementById("project").value;
  const firstVisit = document.getElementById("firstVisit").checked;
  const inTime = document.getElementById("inTime").value;
  const outTime = document.getElementById("outTime").value;

  if (!name || !mobile) {
    alert("Please fill Name & Mobile");
    return;
  }

  let visitCount = 1;
  let previousData = null;

  // ✅ Handle Excel Upload
  const file = document.getElementById("excelFile").files[0];

  if (file) {
    const reader = new FileReader();

    reader.onload = async function(e) {

      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: "array" });

      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const jsonData = XLSX.utils.sheet_to_json(sheet);

      previousData = jsonData;

      visitCount = jsonData.length + 1;

      await proceedSave(visitCount, previousData);
    };

    reader.readAsArrayBuffer(file);

  } else {
    await proceedSave(visitCount, previousData);
  }

  async function proceedSave(visitCount, previousData) {

    const record = {
      type: "engineer_visit",
      name,
      mobile,
      city,
      store,
      project,
      firstVisit,
      inTime,
      outTime,
      visitCount,
      previousData,
      timestamp: new Date().toISOString()
    };

    await saveRecord(record);

    localStorage.setItem("currentSession", JSON.stringify(record));

    // ✅ Redirect
    window.location.href = "central_dashboard.html";
  }
});
</script>

</body>
</html>
