<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engineer Gate</title>

<!-- ✅ Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- ✅ Excel -->
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="w-full max-w-md bg-white p-6 rounded-lg shadow">

  <h2 class="text-xl font-bold text-center mb-4">Engineer Check-In</h2>

  <div class="space-y-3">

    <!-- ✅ Date -->
    <input id="date" type="date" class="w-full p-3 border rounded" />

    <!-- ✅ In Time -->
    <input id="inTime" type="time" class="w-full p-3 border rounded" />

    <!-- ✅ Engineer Details -->
    <input id="name" type="text" placeholder="Engineer Name"
      class="w-full p-3 border rounded" />

    <input id="mobile" type="tel" placeholder="Mobile Number"
      class="w-full p-3 border rounded" />

    <input id="store" type="text" placeholder="Store Name / Code"
      class="w-full p-3 border rounded" />

    <!-- ✅ First Visit Toggle -->
    <label class="flex items-center gap-2">
      <input type="checkbox" id="firstVisit">
      First Day Visit
    </label>

    <!-- ✅ Upload Excel -->
    <div id="uploadDiv">
      <label class="text-sm">Upload Previous Status</label>
      <input type="file" id="excelFile" accept=".xlsx, .xls"
        class="w-full p-2 border rounded">
    </div>

    <!-- ✅ Button -->
    <button id="checkinBtn"
      class="w-full bg-blue-600 text-white p-3 rounded font-bold">
      CHECK-IN
    </button>

  </div>
</div>

<!-- ✅ IndexedDB -->
<script>
const DB_NAME = "ITStoreDB";

function openDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, 1);

    request.onupgradeneeded = function (e) {
      const db = e.target.result;

      // ✅ Visit table
      db.createObjectStore("visits", {
        keyPath: "id",
        autoIncrement: true
      });
    };

    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
}

// ✅ Get all visits
async function getAllVisits() {
  const db = await openDB();
  return new Promise((resolve) => {
    const tx = db.transaction("visits", "readonly");
    const req = tx.objectStore("visits").getAll();
    req.onsuccess = () => resolve(req.result);
  });
}

// ✅ Save visit
async function saveVisit(data) {
  const db = await openDB();
  const tx = db.transaction("visits", "readwrite");
  tx.objectStore("visits").add(data);
}
</script>

<!-- ✅ UI Logic -->
<script>

// ✅ Hide upload if first visit
document.getElementById("firstVisit").addEventListener("change", function () {
  document.getElementById("uploadDiv").style.display = this.checked ? "none" : "block";
});

// ✅ Check-In Logic
document.getElementById("checkinBtn").addEventListener("click", async () => {

  const date = document.getElementById("date").value;
  const inTime = document.getElementById("inTime").value;
  const name = document.getElementById("name").value.trim();
  const mobile = document.getElementById("mobile").value.trim();
  const store = document.getElementById("store").value.trim();
  const firstVisit = document.getElementById("firstVisit").checked;
  const file = document.getElementById("excelFile").files[0];

  if (!date || !inTime || !name || !mobile) {
    alert("Fill Date, Time, Name & Mobile");
    return;
  }

  // ✅ Validation
  if (!firstVisit && !file) {
    alert("Please upload previous Excel file for non-first visit");
    return;
  }

  // ✅ Get previous visits count
  const visits = await getAllVisits();

  let visitCount = 1;

  if (visits.length > 0) {
    const sameEngineer = visits.filter(v => v.mobile === mobile && v.store === store);
    visitCount = sameEngineer.length + 1;
  }

  // ✅ Handle Excel
  let previousData = null;

  if (file) {
    const reader = new FileReader();

    reader.onload = async function (e) {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: "array" });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      previousData = XLSX.utils.sheet_to_json(sheet);

      await finalSave();
    };

    reader.readAsArrayBuffer(file);
  } else {
    await finalSave();
  }

  // ✅ Final Save Function
  async function finalSave() {

    const record = {
      engineer: name,
      mobile: mobile,
      store: store,
      date: date,
      inTime: inTime,
      firstVisit: firstVisit,
      visitCount: visitCount,
      previousData: previousData,
      timestamp: new Date().toISOString()
    };

    await saveVisit(record);

    // ✅ Save session
    localStorage.setItem("currentSession", JSON.stringify(record));

    // ✅ Redirect
    window.location.href = "central_dashboard.html";
  }

});
</script>

</body>
</html>
