<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-[#f8f9ff]">

<script>
// ✅ BLOCK WITHOUT CHECKIN
if (!localStorage.getItem("checkedInToday")) {
  window.location.href = "engineer_gate.html";
}
</script>

<div class="p-4 text-center font-bold text-blue-700 text-lg shadow bg-white">
  IT Store Setup Pro
</div>

<div class="p-4 max-w-md mx-auto">

  <!-- ✅ PROGRESS -->
  <div class="bg-white p-5 rounded-xl shadow text-center mb-5">
    <p class="text-gray-500">Total Progress</p>
    <h2 id="progressText" class="text-3xl font-bold text-blue-700">0%</h2>
  </div>

  <!-- ✅ ENGINEER INFO -->
  <div class="bg-blue-600 text-white p-4 rounded-xl mb-4">
    <p><b>Engineer:</b> <span id="name"></span></p>
    <p><b>Store:</b> <span id="store"></span></p>
  </div>

  <!-- ✅ MODULES -->
  <button onclick="goReadiness()" class="w-full p-4 bg-white rounded-xl shadow mb-3">
    Site Readiness
  </button>

  <button onclick="goAssets()" class="w-full p-4 bg-white rounded-xl shadow mb-3">
    IT Asset Delivery
  </button>

</div>

<script>

// ✅ LOAD SESSION
const session = JSON.parse(localStorage.getItem("currentSession"));
if (session) {
  document.getElementById("name").innerText = session.name || "";
  document.getElementById("store").innerText = session.store || "";
}

// ✅ LOAD PROGRESS
function loadProgress() {

  let sr = parseInt(localStorage.getItem("siteReadinessProgress")) || 0;
  let asset = parseInt(localStorage.getItem("assetProgress")) || 0;

  let total = Math.round((sr + asset) / 2);

  document.getElementById("progressText").innerText = total + "%";
}

loadProgress();

// ✅ NAVIGATION
function goReadiness() {
  window.location.href = "site_readiness.html";
}

function goAssets() {
  window.location.href = "it_asset_delivery.html";
}

</script>

</body>
</html>
