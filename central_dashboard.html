<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<!-- ✅ CORRECT Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<!-- HEADER -->
<div class="bg-white p-4 shadow text-center font-bold text-blue-600">
  IT Store Setup Dashboard
</div>

<!-- CONTENT -->
<div class="p-4 max-w-md mx-auto">

  <!-- Progress -->
  <div class="bg-white p-4 rounded shadow text-center mb-4">
    <p class="text-gray-500">Progress</p>
    <h2 class="text-2xl font-bold text-blue-600">64%</h2>
  </div>

  <!-- Engineer Info -->
  <div class="bg-blue-600 text-white p-4 rounded mb-4">
    <p><b>Engineer:</b> <span id="name">-</span></p>
    <p><b>Store:</b> <span id="store">-</span></p>
  </div>

  <!-- Button -->
  <button onclick="goNext()"
    class="w-full bg-white p-4 rounded shadow flex justify-between items-center">
    <span>Site Readiness</span>
    ➝
  </button>

</div>

<!-- ✅ SCRIPTS -->
<script src="js/db.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<script>

// ✅ Load data
try {
  const session = JSON.parse(localStorage.getItem("currentSession"));
  if (session) {
    document.getElementById("name").innerText = session.name || "-";
    document.getElementById("store").innerText = session.store || "-";
  }
} catch (e) {
  console.log("No session");
}

// ✅ Navigation
function goNext() {
  window.location.href = "site_readiness.html";
}

</script>

</body>
</html>
