<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<!-- ✅ Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<!-- ✅ BLOCK ACCESS IF NOT CHECKED IN -->
<script>
if (!localStorage.getItem("checkedInToday")) {
  alert("Please check-in first");
  window.location.href = "engineer_gate.html";
}
</script>

<!-- HEADER -->
<div class="bg-white p-4 text-center font-bold text-blue-600 shadow">
  IT Store Setup Dashboard
</div>

<!-- CONTENT -->
<div class="p-4 max-w-md mx-auto">

  <!-- Engineer Info -->
  <div class="bg-blue-600 text-white p-4 rounded mb-4">
    <p><b>Engineer:</b> <span id="name"></span></p>
    <p><b>Store:</b> <span id="store"></span></p>
  </div>

  <!-- Button -->
  <button onclick="goNext()"
    class="w-full bg-white p-4 rounded shadow flex justify-between">
    <span>Site Readiness</span>
    ➝
  </button>

</div>

<script>

// ✅ Load session
const session = JSON.parse(localStorage.getItem("currentSession"));

if (session) {
  document.getElementById("name").innerText = session.name;
  document.getElementById("store").innerText = session.store;
}

// ✅ Navigation
function goNext() {
  window.location.href = "site_readiness.html";
}

</script>

</body>
</html>
